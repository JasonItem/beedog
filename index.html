<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蜜蜂狗 - 抖音火爆的肿脸委屈小狗</title>
    <meta name="description" content="从抖音爆火到统治加密世界。蜜蜂狗是那个脸肿了但也变强了的小狗。社区驱动，全网最“肿” Memecoin。">
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                yellow: '#FFD700',
                gold: '#FFC000',
                orange: '#FFA500',
                dark: '#0A0A0A',
                gray: '#171717',
                accent: '#3B82F6'
              }
            },
            fontFamily: {
              sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
              display: ['Space Grotesk', 'PingFang SC', 'sans-serif'],
              comic: ['Comic Neue', 'cursive'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'hero-glow': 'conic-gradient(from 180deg at 50% 50%, #FFD700 0deg, #FFA500 180deg, #FFD700 360deg)',
            },
            animation: {
              'blob': 'blob 10s infinite',
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'spin-slow': 'spin 12s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shine': 'shine 3s linear infinite',
              'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shine: {
                '0%': { backgroundPosition: '200% center' },
                '100%': { backgroundPosition: '-200% center' },
              },
              pulseGlow: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.5' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=Comic+Neue:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', 'PingFang SC', sans-serif;
        background-color: #f8fafc;
        transition: background-color 0.5s ease, color 0.5s ease;
        overflow-x: hidden;
      }
      
      .dark body {
        background-color: #050505;
      }

      /* Premium Glassmorphism */
      .glass {
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.4);
      }
      .dark .glass {
        background: rgba(20, 20, 20, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
      }
      .dark .glass-card {
        background: rgba(30, 30, 30, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      /* Noise Texture Overlay */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .dark .bg-noise {
        opacity: 0.05;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #FFD700; 
        border-radius: 10px;
      }
      
      .honey-pattern {
        background-image: radial-gradient(#FFD700 0.5px, transparent 0.5px);
        background-size: 24px 24px;
      }
      
      .dark .honey-pattern {
        background-image: radial-gradient(#333 0.5px, transparent 0.5px);
        background-size: 24px 24px;
      }

      .text-glow {
        text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
      }
      
      .clip-text-image {
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      }

      /* Smooth selection */
      ::selection {
        background: #FFD700;
        color: #000;
      }
    </style>
<script type="importmap">

}
</script>
