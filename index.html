<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蜜蜂狗 - 抖音火爆的肿脸委屈小狗</title>
    <meta name="description" content="从抖音爆火到统治加密世界。蜜蜂狗是那个脸肿了但也变强了的小狗。社区驱动，全网最“肿” Memecoin。">
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                yellow: '#FFD700',
                gold: '#FFC000',
                orange: '#FFA500',
                dark: '#0A0A0A',
                gray: '#171717',
                accent: '#3B82F6'
              }
            },
            gridTemplateColumns: {
              '15': 'repeat(15, minmax(0, 1fr))',
            },
            gridTemplateRows: {
              '15': 'repeat(15, minmax(0, 1fr))',
            },
            fontFamily: {
              sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
              display: ['Space Grotesk', 'PingFang SC', 'sans-serif'],
              comic: ['Comic Neue', 'cursive'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
              'hero-glow': 'conic-gradient(from 180deg at 50% 50%, #FFD700 0deg, #FFA500 180deg, #FFD700 360deg)',
              'wood-pattern': "url('https://www.transparenttextures.com/patterns/wood-pattern.png')",
            },
            animation: {
              'blob': 'blob 10s infinite',
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'spin-slow': 'spin 12s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'shine': 'shine 3s linear infinite',
              'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'danmaku': 'danmaku 15s linear infinite',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shine: {
                '0%': { backgroundPosition: '200% center' },
                '100%': { backgroundPosition: '-200% center' },
              },
              pulseGlow: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.5' },
              },
              danmaku: {
                '0%': { transform: 'translateX(100vw)' },
                '100%': { transform: 'translateX(-100%)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&family=Comic+Neue:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', 'PingFang SC', sans-serif;
        background-color: #f8fafc;
        transition: background-color 0.5s ease, color 0.5s ease;
        overflow-x: hidden;
      }
      .dark body { background-color: #050505; }
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .dark .glass {
        background: rgba(20, 20, 20, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .honey-pattern {
        background-image: radial-gradient(#FFD700 0.5px, transparent 0.5px);
        background-size: 24px 24px;
      }
      .clip-text-image {
        -webkit-background-clip: text;
        color: transparent;
        background-image: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
      }
      ::selection { background: #FFD700; color: #000; }
      
      /* Gomoku Board Styles */
      .gomoku-board {
        background-color: #e3c08d;
        background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",

    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "firebase/": "https://aistudiocdn.com/firebase@^12.6.0/",
    "jszip": "https://aistudiocdn.com/jszip@^3.10.1",
    "html2canvas": "https://aistudiocdn.com/html2canvas@^1.4.1",
    "path": "https://esm.sh/path@^0.12.7",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
</head>

  <script type="module" src="/index.tsx"></script>
</body>
</html>
