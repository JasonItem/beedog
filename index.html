<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蜜蜂狗 - 抖音火爆的肿脸委屈小狗</title>
    <meta name="description" content="从抖音爆火到统治加密世界。蜜蜂狗是那个脸肿了但也变强了的小狗。社区驱动，全网最“肿” Memecoin。">
    <link rel="icon" type="image/png" href="logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                yellow: '#FFD700',
                orange: '#FFA500',
                dark: '#0f0f0f',
                gray: '#1A1A1A',
                accent: '#3B82F6'
              }
            },
            fontFamily: {
              sans: ['PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', 'sans-serif'],
              comic: ['Comic Neue', 'cursive'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'blob': 'blob 7s infinite',
              'float': 'float 6s ease-in-out infinite',
              'spin-slow': 'spin 12s linear infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      /* Glassmorphism utilities */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
      .dark .glass {
        background: rgba(15, 15, 15, 0.7);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .dark .glass-card {
        background: rgba(30, 30, 30, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent; 
      }
      ::-webkit-scrollbar-thumb {
        background: #FFD700; 
        border-radius: 4px;
      }
      
      .honey-pattern {
        background-color: #fdfdfd;
        background-image: radial-gradient(#FFD700 1px, transparent 1px);
        background-size: 30px 30px;
      }
      
      .dark .honey-pattern {
        background-color: #050505;
        background-image: radial-gradient(#333 1px, transparent 1px);
        background-size: 30px 30px;
      }

      .text-glow {
        text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      }

      /* Retro Window Style */
      .retro-window {
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        border: 2px solid #000;
      }
      .dark .retro-window {
        box-shadow: 4px 4px 0px 0px #F59E0B;
        border: 2px solid #F59E0B;
      }
    </style>

}
</script>
